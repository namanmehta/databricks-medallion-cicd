bundle:
  name: databricks-medallion-cicd

variables:
  target_catalog:
    description: Target Unity Catalog for the pipeline
    default: tpch_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c533f178-082b.cloud.databricks.com
    variables:
      target_catalog: tpch_dev

  staging:
    workspace:
      host: https://dbc-c533f178-082b.cloud.databricks.com
    variables:
      target_catalog: tpch_staging

  prod:
    mode: production
    workspace:
      host: https://dbc-c533f178-082b.cloud.databricks.com
    variables:
      target_catalog: tpch_prod

resources:
  jobs:
    medallion_pipeline:
      name: tpch_medallion_pipeline
      tasks:
        - task_key: bronze_load
          notebook_task:
            notebook_path: /Repos/namanmehta550@gmail.com/databricks-medallion-cicd/notebooks/bronze/01_bronze
            base_parameters:
              target_catalog: ${var.target_catalog}
          job_cluster_key: main_cluster

        - task_key: silver_transform
          depends_on:
            - task_key: bronze_load
          notebook_task:
            notebook_path: /Repos/namanmehta550@gmail.com/databricks-medallion-cicd/notebooks/silver/02_silver
            base_parameters:
              target_catalog: ${var.target_catalog}
          job_cluster_key: main_cluster

        - task_key: gold_marts
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: /Repos/namanmehta550@gmail.com/databricks-medallion-cicd/notebooks/gold/03_gold
            base_parameters:
              target_catalog: ${var.target_catalog}
          job_cluster_key: main_cluster

      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
