trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  DBX_HOST: $(DATABRICKS_HOST)
  DBX_TOKEN: $(DATABRICKS_TOKEN)
  DBX_JOB_ID: $(DATABRICKS_JOB_ID)

stages:
  - stage: Validate
    displayName: Validate Notebooks
    jobs:
      - job: ValidateNotebooks
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.10'
          - script: |
              pip install nbformat
              python -c "
              import nbformat, glob, sys
              notebooks = glob.glob('notebooks/**/*.ipynb', recursive=True)
              errors = []
              for nb in notebooks:
                  try:
                      with open(nb) as f:
                          nbformat.read(f, as_version=4)
                      print(f'OK: {nb}')
                  except Exception as e:
                      errors.append(f'FAIL: {nb}: {e}')
              if errors:
                  print('\n'.join(errors))
                  sys.exit(1)
              "
            displayName: Validate notebook syntax

  - stage: DeployDev
    displayName: Deploy to Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployDev
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              pip install databricks-cli
              databricks jobs run-now \
                --job-id $(DBX_JOB_ID) \
                --notebook-params '{"target_catalog": "tpch_dev"}'
            displayName: Trigger Databricks Job dev
            env:
              DATABRICKS_HOST: $(DBX_HOST)
              DATABRICKS_TOKEN: $(DBX_TOKEN)

  - stage: DeployStaging
    displayName: Deploy to Staging
    dependsOn: DeployDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployStaging
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              pip install databricks-cli
              databricks jobs run-now \
                --job-id $(DBX_JOB_ID) \
                --notebook-params '{"target_catalog": "tpch_staging"}'
            displayName: Trigger Databricks Job staging
            env:
              DATABRICKS_HOST: $(DBX_HOST)
              DATABRICKS_TOKEN: $(DBX_TOKEN)

  - stage: DeployProd
    displayName: Deploy to Prod
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    pip install databricks-cli
                    databricks jobs run-now \
                      --job-id $(DBX_JOB_ID) \
                      --notebook-params '{"target_catalog": "tpch_prod"}'
                  displayName: Trigger Databricks Job prod
                  env:
                    DATABRICKS_HOST: $(DBX_HOST)
                    DATABRICKS_TOKEN: $(DBX_TOKEN)